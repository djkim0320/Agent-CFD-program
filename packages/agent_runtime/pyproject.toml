[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aero-agent-runtime"
version = "0.1.0"
description = "Custom agent runtime for the aero agent workspace"
requires-python = ">=3.12"
dependencies = [
  "aero-agent-contracts>=0.1.0",
  "aero-agent-common>=0.1.0",
  "aero-agent-cfd-core>=0.1.0",
  "aero-agent-provider-openai>=0.1.0",
  "aero-agent-provider-codex>=0.1.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
