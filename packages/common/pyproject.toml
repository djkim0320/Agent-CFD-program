[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aero-agent-common"
version = "0.1.0"
description = "Common utilities for the aero agent workspace"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.10.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
